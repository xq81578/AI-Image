<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>十年前与现在 - 单文件版</title>
    <style>
      :root {
        --bg: #f3f1ec;
        --panel: #ffffff;
        --text: #1e2024;
        --muted: #6b6f78;
        --line: #d9d4ca;
        --accent: #245f64;
        --accent-dark: #18484d;
        --warm: #ad7440;
        --danger: #9b3b2f;
        --shadow: 0 16px 42px rgba(31, 35, 39, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        color: var(--text);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.2)), var(--bg);
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfaf8;
        color: var(--text);
        outline: none;
      }

      textarea,
      input {
        padding: 11px 12px;
      }

      select {
        padding: 10px 12px;
      }

      textarea:focus,
      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(36, 95, 100, 0.13);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        line-height: 1.15;
      }

      h2 {
        font-size: 18px;
      }

      h3 {
        font-size: 16px;
      }

      label {
        display: grid;
        gap: 7px;
        margin-bottom: 13px;
        color: var(--muted);
        font-size: 13px;
      }

      .shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      .topbar p,
      .panel-title span,
      figcaption,
      .hint {
        color: var(--muted);
      }

      .topbar p {
        margin-top: 5px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.25fr);
        gap: 16px;
        align-items: start;
      }

      .bottom-grid {
        margin-top: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid rgba(30, 32, 36, 0.08);
        border-radius: 8px;
        padding: 18px;
        box-shadow: var(--shadow);
      }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .field-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 12px;
      }

      .primary,
      .secondary,
      .ghost {
        min-height: 42px;
        border-radius: 8px;
        padding: 0 16px;
        font-weight: 700;
      }

      .primary {
        width: 100%;
        background: var(--accent);
        color: white;
      }

      .primary:hover {
        background: var(--accent-dark);
      }

      .primary:disabled,
      .secondary:disabled,
      .ghost:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .secondary {
        background: #ffffff;
        border: 1px solid var(--line);
        color: var(--text);
      }

      .ghost {
        background: #f6f3ed;
        border: 1px solid transparent;
        color: var(--accent-dark);
      }

      .button-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .idea-list {
        display: grid;
        gap: 10px;
        max-height: 560px;
        overflow: auto;
        padding-right: 4px;
      }

      .idea-card {
        display: grid;
        gap: 8px;
        padding: 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfaf8;
        text-align: left;
      }

      .idea-card:hover,
      .idea-card.active {
        border-color: var(--accent);
      }

      .idea-card strong {
        font-size: 15px;
      }

      .idea-card p {
        color: #50545d;
        line-height: 1.55;
      }

      .idea-card span {
        color: var(--warm);
        font-size: 12px;
      }

      .image-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 14px;
      }

      figure {
        margin: 0;
      }

      .image-box {
        display: grid;
        place-items: center;
        width: 100%;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ebe7de;
        overflow: hidden;
      }

      .image-box::before {
        content: "等待图片";
        color: var(--muted);
      }

      .image-box:has(img[src])::before {
        content: "";
      }

      .image-box img {
        display: none;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .image-box img[src] {
        display: block;
      }

      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-top: 8px;
        font-size: 13px;
      }

      figcaption a {
        color: var(--accent-dark);
        font-weight: 700;
        text-decoration: none;
      }

      .copy-block {
        margin-top: 16px;
      }

      .copy-block h3 {
        margin-bottom: 10px;
      }

      .status {
        min-height: 20px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .status.error {
        color: var(--danger);
      }

      details {
        margin-top: 12px;
      }

      summary {
        cursor: pointer;
        color: var(--accent-dark);
        font-weight: 700;
      }

      .config-grid {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .notice {
        margin-bottom: 14px;
        padding: 10px 12px;
        border: 1px solid #dfc8b8;
        border-radius: 8px;
        background: #fff7ef;
        color: #744830;
        line-height: 1.55;
        font-size: 13px;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .shell {
          padding: 14px;
        }

        .topbar,
        .field-row,
        .button-row,
        .image-grid {
          display: grid;
          grid-template-columns: 1fr;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>十年前与现在</h1>
          <p>单 HTML 版，直接在浏览器里调用 API</p>
        </div>
        <button id="toggleConfig" class="secondary" type="button">配置 Key</button>
      </header>

      <section id="configPanel" class="panel hidden">
        <div class="notice">
          单文件版会把 Key 保存在当前浏览器的 localStorage，只适合自己本地使用。某些 API 可能因为 CORS 不允许浏览器直连，遇到这种情况再加一个很薄的代理即可。
        </div>
        <div class="field-row">
          <label>
            DeepSeek API Key
            <input id="deepseekKey" type="password" autocomplete="off" placeholder="sk-...">
          </label>
          <label>
            DeepSeek 模型
            <input id="deepseekModel" type="text" value="deepseek-chat">
          </label>
        </div>
        <label>
          DeepSeek Base URL
          <input id="deepseekBaseUrl" type="text" value="https://api.deepseek.com">
        </label>
        <div class="field-row">
          <label>
            OpenAI API Key
            <input id="openaiKey" type="password" autocomplete="off" placeholder="sk-...">
          </label>
          <label>
            OpenAI 图片模型
            <input id="openaiModel" type="text" value="gpt-image-2">
          </label>
        </div>
        <div class="field-row">
          <label>
            OpenAI 尺寸
            <select id="openaiSize">
              <option>1024x1024</option>
              <option>1024x1536</option>
              <option>1536x1024</option>
            </select>
          </label>
          <label>
            OpenAI 质量
            <select id="openaiQuality">
              <option>medium</option>
              <option>low</option>
              <option>high</option>
            </select>
          </label>
        </div>
        <div class="field-row">
          <label>
            Gemini API Key
            <input id="geminiKey" type="password" autocomplete="off" placeholder="AIza...">
          </label>
          <label>
            Gemini 图片模型
            <input id="geminiModel" type="text" value="gemini-2.5-flash-image">
          </label>
        </div>
        <div class="field-row">
          <label>
            Gemini 比例
            <select id="geminiAspectRatio">
              <option>1:1</option>
              <option>4:5</option>
              <option>9:16</option>
              <option>16:9</option>
            </select>
          </label>
          <label>
            默认图片模型
            <select id="defaultProvider">
              <option value="mock">Mock 流程预览</option>
              <option value="openai">OpenAI gpt-image</option>
              <option value="gemini">Gemini Nano Banana</option>
            </select>
          </label>
        </div>
        <div class="button-row">
          <button id="saveConfig" class="primary" type="button">保存配置</button>
          <button id="clearConfig" class="ghost" type="button">清空本地配置</button>
        </div>
        <div id="configStatus" class="status"></div>
      </section>

      <section class="grid">
        <form id="ideaForm" class="panel">
          <div class="panel-title">
            <h2>AI 生成选题灵感</h2>
            <span id="keyStatus">未读取配置</span>
          </div>
          <label>
            补充方向
            <textarea id="brief" rows="4" placeholder="可以留空，也可以写：老家、奶奶、校门口、十年后独自回来"></textarea>
          </label>
          <div class="field-row">
            <label>
              主题
              <select id="theme">
                <option>农村老屋</option>
                <option>老家院子</option>
                <option>村庄变迁</option>
                <option>荒废院落</option>
                <option>亲情</option>
                <option>校园</option>
                <option>老街</option>
                <option>爱情</option>
                <option>宠物</option>
                <option>城市变迁</option>
                <option>老物件</option>
              </select>
            </label>
            <label>
              情绪
              <select id="emotion">
                <option>怀旧</option>
                <option>温暖</option>
                <option>遗憾</option>
                <option>治愈</option>
                <option>孤独</option>
                <option>释然</option>
              </select>
            </label>
          </div>
          <div class="field-row">
            <label>
              平台
              <select id="platform">
                <option>小红书</option>
                <option>抖音</option>
                <option>视频号</option>
                <option>公众号</option>
              </select>
            </label>
            <label>
              数量
              <input id="count" type="number" min="1" max="12" value="6">
            </label>
          </div>
          <button class="primary" type="submit">生成灵感</button>
          <div id="ideaStatus" class="status"></div>
        </form>

        <section class="panel">
          <div class="panel-title">
            <h2>当前提示词</h2>
            <span id="selectedTitle">未选择</span>
          </div>
          <label>
            十年前提示词
            <textarea id="decadePrompt" rows="8" placeholder="选择一个选题后自动生成，也可以手动编辑"></textarea>
          </label>
          <label>
            现在提示词
            <textarea id="nowPrompt" rows="8" placeholder="这里会尽量保持同地点、同视角，只改变时间后的状态"></textarea>
          </label>
          <div class="field-row">
            <label>
              图片模型
              <select id="providerSelect">
                <option value="mock">Mock 流程预览</option>
                <option value="openai">OpenAI gpt-image</option>
                <option value="gemini">Gemini Nano Banana</option>
              </select>
            </label>
            <label>
              比例
              <select id="ratio">
                <option>4:5</option>
                <option>1:1</option>
                <option>9:16</option>
                <option>16:9</option>
              </select>
            </label>
          </div>
          <div class="button-row">
            <button id="promptButton" class="ghost" type="button">用当前灵感重写提示词</button>
            <button id="copyPromptButton" class="secondary" type="button">复制提示词</button>
            <button id="imageButton" class="primary" type="button">生成两张图片</button>
          </div>
          <div id="imageStatus" class="status"></div>
        </section>
      </section>

      <section class="grid bottom-grid">
        <section class="panel">
          <div class="panel-title">
            <h2>灵感选题</h2>
            <span id="ideaCount">0 个</span>
          </div>
          <div id="ideas" class="idea-list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>图片结果</h2>
            <span id="resultStatus">等待生成</span>
          </div>
          <div class="image-grid">
            <figure>
              <div class="image-box"><img id="decadeImage" alt="十年前图片"></div>
              <figcaption><span>十年前</span><a id="downloadDecade" class="hidden" download="十年前.png">下载</a></figcaption>
            </figure>
            <figure>
              <div class="image-box"><img id="nowImage" alt="现在图片"></div>
              <figcaption><span>现在</span><a id="downloadNow" class="hidden" download="现在.png">下载</a></figcaption>
            </figure>
          </div>
          <div class="copy-block">
            <h3>配文</h3>
            <textarea id="caption" rows="5" placeholder="生成提示词后这里会出现自媒体配文"></textarea>
          </div>
        </section>
      </section>
    </main>

    <script>
      const $ = (selector) => document.querySelector(selector);
      const storageKey = "timeEchoSingleFileConfig";
      const state = {
        config: {},
        ideas: [],
        selectedIdea: null,
        promptPack: null
      };

      const defaults = {
        deepseekKey: "",
        deepseekBaseUrl: "https://api.deepseek.com",
        deepseekModel: "deepseek-chat",
        openaiKey: "",
        openaiModel: "gpt-image-2",
        openaiSize: "1024x1024",
        openaiQuality: "medium",
        geminiKey: "",
        geminiModel: "gemini-2.5-flash-image",
        geminiAspectRatio: "1:1",
        defaultProvider: "mock"
      };

      const systemPrompt = `你是一个自媒体视觉策划和 AI 生图提示词导演。
你的任务是围绕“十年前 vs 现在”的时间对照图生成创意、提示词和文案。
默认优先创作农村房屋、老家院子、灶房、菜园、水井、村口小路、晒谷场、农具棚、牲口棚、小卖部、老戏台、祠堂门口等农村生活空间和村庄环境变迁类内容。核心不是“过去穷现在富”，而是“以前简陋但有生机，现在更清楚但荒凉空置”。
风格要求：真实、克制、有生活感，避免空洞鸡汤，避免过度煽情，重点表现房子还在、生活不在了，烟火气消失，人气散了。
输出必须是严格 JSON，不要 Markdown，不要解释。`;

      const oldPhoneTexture = "旧手机随手拍质感：像普通人用十年前的老安卓手机或早期智能手机随手拍下来的生活照片，不是专业摄影，不要精致构图，不要电影感，不要摆拍。画面轻微失焦，低像素，压缩痕迹明显，暗部有噪点，白平衡不准，略微偏黄或偏绿，边缘有些糊，主体没有完全居中，画面略歪，可能有轻微手抖和运动模糊，边缘可能有遮挡，生活杂物自然入镜，真实、粗糙、自然、不完美。避免专业摄影棚、电影级光影、高级构图、过度清晰、商业广告质感、完美皮肤、精致摆拍、复古海报风。";

      const currentPhoneTexture = "现在照片质感：清晰一些，但仍然像普通手机随手拍的真实生活照片，不要商业摄影，不要电影感，不要精致摆拍，不要过度修图，保留自然光、真实环境和生活细节。";

      const ruralContrastGuide = "农村环境变迁方向：范围可以从老屋院子拓展到灶房、菜园、水井、村口小路、晒谷场、农具棚、牲口棚、小卖部、村卫生室、老戏台、祠堂门口等农村生活空间，但方向必须仍然是农村和老家记忆。十年前的场景可以简陋、旧、朴素，但必须有人气和生机，比如温暖阳光、扫过的院子、晾衣绳、菜园、门前树、鸡鸭、柴火、炊烟、老人或小孩经过、正在使用的农具、有人打水浇菜、晒粮、聊天、买东西。现在的同一地点照片更清楚，但要呈现空置、荒凉、杂乱、荒废，比如杂草丛生、墙皮脱落、门窗破旧、菜园荒了、晾衣绳空着、压水井生锈、灶台落灰、农具废弃、旧招牌褪色、塑料桶和杂物堆在角落、没有炊烟、没有人、生活气消失。重点表达：以前的简陋是活着的，现在的清楚是空着的。";

      function loadConfig() {
        try {
          state.config = { ...defaults, ...JSON.parse(localStorage.getItem(storageKey) || "{}") };
        } catch {
          state.config = { ...defaults };
        }
        for (const [key, value] of Object.entries(state.config)) {
          const input = $("#" + key);
          if (input) input.value = value;
        }
        $("#providerSelect").value = state.config.defaultProvider || "mock";
        updateKeyStatus();
      }

      function saveConfig() {
        const next = {};
        for (const key of Object.keys(defaults)) {
          const input = $("#" + key);
          next[key] = input ? input.value.trim() : defaults[key];
        }
        state.config = next;
        localStorage.setItem(storageKey, JSON.stringify(next));
        $("#providerSelect").value = next.defaultProvider;
        showStatus("#configStatus", "配置已保存到当前浏览器。");
        updateKeyStatus();
      }

      function clearConfig() {
        localStorage.removeItem(storageKey);
        state.config = { ...defaults };
        loadConfig();
        showStatus("#configStatus", "本地配置已清空。");
      }

      function updateKeyStatus() {
        const parts = [
          state.config.deepseekKey ? "DeepSeek 已配置" : "DeepSeek 未配置",
          state.config.openaiKey ? "OpenAI 已配置" : "OpenAI 未配置",
          state.config.geminiKey ? "Gemini 已配置" : "Gemini 未配置"
        ];
        $("#keyStatus").textContent = parts.join(" · ");
      }

      function setBusy(button, busy, text) {
        if (!button.dataset.idleText) button.dataset.idleText = button.textContent;
        button.disabled = busy;
        button.textContent = busy ? text : button.dataset.idleText;
      }

      function showStatus(selector, message, isError = false) {
        const node = $(selector);
        node.textContent = message || "";
        node.classList.toggle("error", Boolean(isError));
      }

      function buildTimeEditLockGuide() {
        return `【图2最高优先级锁定指令】
图片2必须以图片1为唯一底图做时间流逝编辑，不要重新设计相似地点。
先锁定图片1的场景指纹：道路宽度和走向、左右建筑或墙体、树和电线杆位置、固定参照物之间的距离、前景/背景大轮廓、拍摄高度、镜头距离、透视关系和画面歪斜方向。
必须保持这些不变：固定参照物的位置/数量/外轮廓/相互关系，建筑墙体材质和屋顶形式，门窗位置，道路宽度和走向，树木主干/主分叉/树冠大轮廓，电线杆位置和姿态。
只允许做表面时间变化：人物和热闹活动消失，物体落灰、褪色、开裂、生锈，路边或裂缝长草，广告纸破损，增加落叶、蛛网、塑料袋、小垃圾，光线变灰白冷清。
禁止结构变化：不要把宽路改窄路，不要把道路改方向，不要换房子材质，不要换屋顶，不要移动房屋/墙/门窗/树/电线杆，不要把绿树整体换成另一棵枯树，不要新增大型建筑或道路。
如果后面的图2变化提示词与本锁定指令冲突，必须忽略冲突部分，把它改写成表面荒废效果。`;
      }

      function buildPromptCopyText() {
        const decadePrompt = $("#decadePrompt").value.trim();
        const nowPrompt = $("#nowPrompt").value.trim();
        const lockGuide = buildTimeEditLockGuide();
        return `请生成一组同一地点的十年前后对比图。

第一步：根据【图1提示词】生成图片1，图片1是十年前的原始现场照片。

      async function copyText(text) {
        if (navigator.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(text);
            return;
          } catch {
            // 剪贴板权限失败时继续使用 textarea 兜底。
          }
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.append(textarea);
        textarea.select();
        const copied = document.execCommand("copy");
        textarea.remove();
        if (!copied) throw new Error("复制失败，请检查浏览器剪贴板权限");
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const text = await response.text();
        let data = {};
        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          data = { raw: text };
        }
        if (!response.ok) {
          throw new Error(data?.error?.message || data?.message || `HTTP ${response.status}`);
        }
        return data;
      }

      async function callDeepSeek(messages, temperature = 0.85) {
        if (!state.config.deepseekKey) throw new Error("DeepSeek API Key 未配置");
        const baseUrl = state.config.deepseekBaseUrl.replace(/\/$/, "");
        const data = await fetchJson(`${baseUrl}/chat/completions`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
            authorization: `Bearer ${state.config.deepseekKey}`
          },
          body: JSON.stringify({
            model: state.config.deepseekModel || "deepseek-chat",
            messages,
            temperature
          })
        });
        return data.choices?.[0]?.message?.content || "";
      }

      function extractJson(text) {
        const cleaned = String(text || "").replace(/^```(?:json)?/i, "").replace(/```$/i, "").trim();
        try {
          return JSON.parse(cleaned);
        } catch {
          const match = cleaned.match(/\{[\s\S]*\}/);
          if (match) return JSON.parse(match[0]);
          throw new Error("模型没有返回可解析的 JSON");
        }
      }

          $("#caption").value = pack.caption || "";
          showStatus("#imageStatus", "提示词已生成，可以直接生图，也可以先手动改。");
        } catch (error) {
          showStatus("#imageStatus", friendlyError(error), true);
        } finally {
          setBusy(button, false);
        }
      }

      async function imageFromOpenAI(prompt) {
        if (!state.config.openaiKey) throw new Error("OpenAI API Key 未配置");
        const data = await fetchJson("https://api.openai.com/v1/images/generations", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            authorization: `Bearer ${state.config.openaiKey}`
          },
          body: JSON.stringify({
            model: state.config.openaiModel || "gpt-image-2",
            prompt,
            size: state.config.openaiSize || "1024x1024",
            quality: state.config.openaiQuality || "medium",
            n: 1
          })
        });
        const item = data.data?.[0] || {};
        if (item.b64_json) return `data:image/png;base64,${item.b64_json}`;
        if (item.url) return item.url;
        throw new Error("OpenAI 没有返回图片数据");
      }

      async function imageEditFromOpenAI(prompt, referenceDataUrl) {
        if (!referenceDataUrl?.startsWith("data:")) return imageFromOpenAI(prompt);
        if (!state.config.openaiKey) throw new Error("OpenAI API Key 未配置");
        const form = new FormData();
        form.append("model", state.config.openaiModel || "gpt-image-2");
        form.append("prompt", prompt);
        form.append("size", state.config.openaiSize || "1024x1024");
        form.append("quality", state.config.openaiQuality || "medium");
        form.append("n", "1");
        form.append("image", dataUrlToBlob(referenceDataUrl), "reference.png");

        const data = await fetchJson("https://api.openai.com/v1/images/edits", {
          method: "POST",
          headers: { authorization: `Bearer ${state.config.openaiKey}` },
          body: form
        });
        const item = data.data?.[0] || {};
        if (item.b64_json) return `data:image/png;base64,${item.b64_json}`;
        if (item.url) return item.url;
        throw new Error("OpenAI 没有返回图片数据");
      }

      async function imageFromGemini(prompt, referenceDataUrl) {
        if (!state.config.geminiKey) throw new Error("Gemini API Key 未配置");
        const parts = [{ text: prompt }];
        if (referenceDataUrl?.startsWith("data:")) {
          const parsed = parseDataUrl(referenceDataUrl);
          if (parsed) {
            parts.push({
              inlineData: {
                mimeType: parsed.mimeType,
                data: parsed.base64
              }
            });
          }
        }
        const model = state.config.geminiModel || "gemini-2.5-flash-image";
        const data = await fetchJson(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.config.geminiKey)}`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts }],
            generationConfig: {
              responseModalities: ["TEXT", "IMAGE"],
              imageConfig: { aspectRatio: state.config.geminiAspectRatio || "1:1" }
            }
          })
        });
        const partsOut = data.candidates?.[0]?.content?.parts || [];
        const imagePart = partsOut.find((part) => part.inlineData?.data || part.inline_data?.data);
        const inline = imagePart?.inlineData || imagePart?.inline_data;
        if (!inline?.data) throw new Error("Gemini 没有返回图片数据");
        return `data:${inline.mimeType || inline.mime_type || "image/png"};base64,${inline.data}`;
      }

      async function mockImage(title, prompt, variant) {
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
          <defs>
            <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="${variant === "old" ? "#b99265" : "#7fa7aa"}"/>
              <stop offset="1" stop-color="${variant === "old" ? "#5e5147" : "#283a4a"}"/>
            </linearGradient>
            <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values=".25"/><feBlend mode="multiply" in2="SourceGraphic"/></filter>
          </defs>
          <rect width="1024" height="1024" fill="url(#bg)"/>
          <rect x="82" y="92" width="860" height="840" rx="18" fill="rgba(255,255,255,.13)" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
          <text x="112" y="180" fill="#fff" font-size="54" font-family="Arial, sans-serif" font-weight="700">${variant === "old" ? "十年前" : "现在"}</text>
          <text x="112" y="250" fill="rgba(255,255,255,.92)" font-size="34" font-family="Arial, sans-serif">${escapeXml(title || "时间对照图")}</text>
          <foreignObject x="112" y="330" width="800" height="480">
            <div xmlns="http://www.w3.org/1999/xhtml" style="font: 30px/1.45 Arial, sans-serif; color: white; opacity: .9;">${escapeXml(prompt).slice(0, 220)}</div>
          </foreignObject>
          <rect width="1024" height="1024" filter="url(#grain)" opacity="${variant === "old" ? ".32" : ".08"}"/>
        </svg>`;
        return `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(svg)))}`;
      }

      async function generateImages() {
        const provider = $("#providerSelect").value;
        const title = $("#selectedTitle").textContent || "十年前和现在";
        const decadePrompt = withOldPhoneTexture($("#decadePrompt").value.trim());
        const lockGuide = buildTimeEditLockGuide();
        const nowPrompt = `${lockGuide}

${withCurrentPhoneTexture($("#nowPrompt").value.trim())}

【图2最终检查】
再次确认：图片2必须严格沿用图片1的场景指纹。不要改变道路宽度和走向、建筑/墙体位置、墙体材质、屋顶形式、树木主干和主分叉、电线杆位置、拍摄角度和透视关系。只允许做无人、荒草、落灰、褪色、破损、杂物和灰白光线这些表面时间变化。`;
        if (!decadePrompt || !nowPrompt.trim()) throw new Error("请先生成或填写两段提示词");

        let decadeUrl;
        let nowUrl;
        if (provider === "openai") {
          decadeUrl = await imageFromOpenAI(decadePrompt);
          nowUrl = await imageEditFromOpenAI(nowPrompt, decadeUrl);
        } else if (provider === "gemini") {
          decadeUrl = await imageFromGemini(decadePrompt);
          nowUrl = await imageFromGemini(nowPrompt, decadeUrl);
        } else {
          decadeUrl = await mockImage(title, decadePrompt, "old");
          nowUrl = await mockImage(title, nowPrompt, "now");
        }
        return { provider, decadeUrl, nowUrl };
      }

      function setImage(selector, downloadSelector, url, fileName) {
        const img = $(selector);
        img.src = url;
        const link = $(downloadSelector);
        link.href = url;
        link.download = fileName;
        link.classList.remove("hidden");
      }

      function parseDataUrl(dataUrl) {
        const match = dataUrl.match(/^data:(.+?);base64,(.+)$/);
        return match ? { mimeType: match[1], base64: match[2] } : null;
      }

      function dataUrlToBlob(dataUrl) {
        const parsed = parseDataUrl(dataUrl);
        if (!parsed) throw new Error("参考图不是可用的 data URL");
        const binary = atob(parsed.base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
        return new Blob([bytes], { type: parsed.mimeType });
      }

      function normalizeRatio(value) {
        const text = String(value || "");
        return ["4:5", "1:1", "9:16", "16:9"].find((ratio) => text.includes(ratio));
      }

      function withOldPhoneTexture(prompt) {
        const text = String(prompt || "").trim();
        if (!text) return oldPhoneTexture;
        return text.includes("旧手机随手拍质感") ? text : `${text}\n\n${oldPhoneTexture}`;
      }

      function withCurrentPhoneTexture(prompt) {
        const text = String(prompt || "").trim();
        if (!text) return currentPhoneTexture;
        return text.includes("现在照片质感") ? text : `${text}\n\n${currentPhoneTexture}`;
      }

      function providerName(provider) {
        return { openai: "OpenAI", gemini: "Gemini", mock: "Mock" }[provider] || provider;
      }

      function friendlyError(error) {
        const message = error?.message || "请求失败";
        if (message.includes("Failed to fetch")) {
          return "请求被浏览器拦截或网络不可达。单文件直连 API 时常见原因是 CORS、代理或网络限制。";
        }
        return message;
      }

      function escapeHtml(value = "") {
        return String(value).replace(/[<>&"']/g, (char) => ({
          "<": "&lt;",
          ">": "&gt;",
          "&": "&amp;",
          '"': "&quot;",
          "'": "&#39;"
        }[char]));
      }

      function escapeXml(value = "") {
        return escapeHtml(value);
      }

      $("#toggleConfig").addEventListener("click", () => {
        $("#configPanel").classList.toggle("hidden");
      });

      $("#saveConfig").addEventListener("click", saveConfig);
      $("#clearConfig").addEventListener("click", clearConfig);

      $("#providerSelect").addEventListener("change", () => {
        $("#defaultProvider").value = $("#providerSelect").value;
        state.config.defaultProvider = $("#providerSelect").value;
        localStorage.setItem(storageKey, JSON.stringify({ ...state.config }));
      });

      $("#ideaForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const button = event.submitter;
        setBusy(button, true, "生成中");
        showStatus("#ideaStatus", "正在生成选题...");
        try {
          const data = await buildIdeas({
            brief: $("#brief").value.trim(),
            theme: $("#theme").value,
            emotion: $("#emotion").value,
            platform: $("#platform").value,
            count: $("#count").value
          });
          state.ideas = data.ideas || [];
          state.selectedIdea = null;
          renderIdeas();
          showStatus("#ideaStatus", state.config.deepseekKey ? "选题已生成。" : "未配置 DeepSeek，已使用本地示例选题。");
        } catch (error) {
          showStatus("#ideaStatus", friendlyError(error), true);
        } finally {
          setBusy(button, false);
        }
      });

      $("#promptButton").addEventListener("click", async () => {
        const idea = state.selectedIdea || {
          title: $("#selectedTitle").textContent,
          story: $("#brief").value.trim() || "同一个地点，十年前有人陪伴，现在独自重返。",
          hook: "时间改变了场景，也改变了站在这里的人。"
        };
        await fillPromptPack(idea);
      });

      $("#copyPromptButton").addEventListener("click", async () => {
        if (!$("#decadePrompt").value.trim() || !$("#nowPrompt").value.trim()) {
          showStatus("#imageStatus", "请先填写十年前和现在两段提示词。", true);
          return;
        }
        try {
          await copyText(buildPromptCopyText());
          showStatus("#imageStatus", "提示词已复制。");
        } catch (error) {
          showStatus("#imageStatus", friendlyError(error), true);
        }
      });

      $("#imageButton").addEventListener("click", async () => {
        const button = $("#imageButton");
        setBusy(button, true, "图片生成中");
        showStatus("#imageStatus", "正在生成两张图片...");
        $("#resultStatus").textContent = "正在生成";
        $("#decadeImage").removeAttribute("src");
        $("#nowImage").removeAttribute("src");
        $("#downloadDecade").classList.add("hidden");
        $("#downloadNow").classList.add("hidden");
        try {
          const result = await generateImages();
          setImage("#decadeImage", "#downloadDecade", result.decadeUrl, "十年前.png");
          setImage("#nowImage", "#downloadNow", result.nowUrl, "现在.png");
          $("#resultStatus").textContent = `${providerName(result.provider)} 已完成`;
          showStatus("#imageStatus", "图片已生成。");
        } catch (error) {
          $("#resultStatus").textContent = "生成失败";
          showStatus("#imageStatus", friendlyError(error), true);
        } finally {
          setBusy(button, false);
        }
      });

      loadConfig();
    </script>
  </body>
</html>
