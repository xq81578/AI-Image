<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2000年前后旧照片与现在（2026年） - 单文件版</title>
    <style>
      :root {
        --bg: #f3f1ec;
        --panel: #ffffff;
        --text: #1e2024;
        --muted: #6b6f78;
        --line: #d9d4ca;
        --accent: #245f64;
        --accent-dark: #18484d;
        --warm: #ad7440;
        --danger: #9b3b2f;
        --shadow: 0 16px 42px rgba(31, 35, 39, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        color: var(--text);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.2)), var(--bg);
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfaf8;
        color: var(--text);
        outline: none;
      }

      textarea,
      input {
        padding: 11px 12px;
      }

      select {
        padding: 10px 12px;
      }

      textarea:focus,
      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(36, 95, 100, 0.13);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        line-height: 1.15;
      }

      h2 {
        font-size: 18px;
      }

      h3 {
        font-size: 16px;
      }

      label {
        display: grid;
        gap: 7px;
        margin-bottom: 13px;
        color: var(--muted);
        font-size: 13px;
      }

      .shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      .version-badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        margin-top: 8px;
        padding: 3px 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fbfaf8;
        color: var(--accent-dark);
        font-size: 12px;
        font-weight: 700;
      }

      .topbar p,
      .panel-title span,
      figcaption,
      .hint {
        color: var(--muted);
      }

      .topbar p {
        margin-top: 5px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.25fr);
        gap: 16px;
        align-items: start;
      }

      .bottom-grid {
        margin-top: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid rgba(30, 32, 36, 0.08);
        border-radius: 8px;
        padding: 18px;
        box-shadow: var(--shadow);
      }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .field-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 12px;
      }

      .primary,
      .secondary,
      .ghost {
        min-height: 42px;
        border-radius: 8px;
        padding: 0 16px;
        font-weight: 700;
      }

      .primary {
        width: 100%;
        background: var(--accent);
        color: white;
      }

      .primary:hover {
        background: var(--accent-dark);
      }

      .primary:disabled,
      .secondary:disabled,
      .ghost:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .secondary {
        background: #ffffff;
        border: 1px solid var(--line);
        color: var(--text);
      }

      .ghost {
        background: #f6f3ed;
        border: 1px solid transparent;
        color: var(--accent-dark);
      }

      .button-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .idea-list {
        display: grid;
        gap: 10px;
        max-height: 560px;
        overflow: auto;
        padding-right: 4px;
      }

      .idea-card {
        display: grid;
        gap: 8px;
        padding: 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfaf8;
        text-align: left;
      }

      .idea-card:hover,
      .idea-card.active {
        border-color: var(--accent);
      }

      .idea-card strong {
        font-size: 15px;
      }

      .idea-card p {
        color: #50545d;
        line-height: 1.55;
      }

      .idea-card span {
        color: var(--warm);
        font-size: 12px;
      }

      .title-workshop {
        margin-top: 16px;
      }

      .title-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .title-card {
        display: grid;
        gap: 8px;
        padding: 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfaf8;
        text-align: left;
      }

      .title-card:hover {
        border-color: var(--accent);
      }

      .title-card strong {
        font-size: 16px;
        line-height: 1.55;
      }

      .title-card p {
        color: #50545d;
        line-height: 1.55;
      }

      .title-card span {
        color: var(--warm);
        font-size: 12px;
      }

      .image-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 14px;
      }

      figure {
        margin: 0;
      }

      .image-box {
        display: grid;
        place-items: center;
        width: 100%;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ebe7de;
        overflow: hidden;
      }

      .image-box::before {
        content: "等待图片";
        color: var(--muted);
      }

      .image-box:has(img[src])::before {
        content: "";
      }

      .image-box img {
        display: none;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .image-box img[src] {
        display: block;
      }

      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-top: 8px;
        font-size: 13px;
      }

      figcaption a {
        color: var(--accent-dark);
        font-weight: 700;
        text-decoration: none;
      }

      .copy-block {
        margin-top: 16px;
      }

      .copy-block h3 {
        margin-bottom: 10px;
      }

      .status {
        min-height: 20px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .status.error {
        color: var(--danger);
      }

      details {
        margin-top: 12px;
      }

      summary {
        cursor: pointer;
        color: var(--accent-dark);
        font-weight: 700;
      }

      .config-grid {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .notice {
        margin-bottom: 14px;
        padding: 10px 12px;
        border: 1px solid #dfc8b8;
        border-radius: 8px;
        background: #fff7ef;
        color: #744830;
        line-height: 1.55;
        font-size: 13px;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .shell {
          padding: 14px;
        }

        .topbar,
        .field-row,
        .button-row,
        .image-grid,
        .title-list {
          display: grid;
          grid-template-columns: 1fr;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>2000年前后旧照片与现在（2026年）</h1>
          <p>单 HTML 版，直接在浏览器里调用 API</p>
          <span class="version-badge">v2026.06.22-旧照破防标题版</span>
        </div>
        <button id="toggleConfig" class="secondary" type="button">配置 Key</button>
      </header>

      <section id="configPanel" class="panel hidden">
        <div class="notice">
          单文件版会把 Key 保存在当前浏览器的 localStorage，只适合自己本地使用。某些 API 可能因为 CORS 不允许浏览器直连，遇到这种情况再加一个很薄的代理即可。
        </div>
        <div class="field-row">
          <label>
            DeepSeek API Key
            <input id="deepseekKey" type="password" autocomplete="off" placeholder="sk-...">
          </label>
          <label>
            DeepSeek 模型
            <input id="deepseekModel" type="text" value="deepseek-chat">
          </label>
        </div>
        <label>
          DeepSeek Base URL
          <input id="deepseekBaseUrl" type="text" value="https://api.deepseek.com">
        </label>
        <div class="field-row">
          <label>
            OpenAI API Key
            <input id="openaiKey" type="password" autocomplete="off" placeholder="sk-...">
          </label>
          <label>
            OpenAI 图片模型
            <input id="openaiModel" type="text" value="gpt-image-2">
          </label>
        </div>
        <div class="field-row">
          <label>
            OpenAI 尺寸
            <select id="openaiSize">
              <option>1024x1024</option>
              <option>1024x1536</option>
              <option>1536x1024</option>
            </select>
          </label>
          <label>
            OpenAI 质量
            <select id="openaiQuality">
              <option>medium</option>
              <option>low</option>
              <option>high</option>
            </select>
          </label>
        </div>
        <div class="field-row">
          <label>
            Gemini API Key
            <input id="geminiKey" type="password" autocomplete="off" placeholder="AIza...">
          </label>
          <label>
            Gemini 图片模型
            <input id="geminiModel" type="text" value="gemini-2.5-flash-image">
          </label>
        </div>
        <div class="field-row">
          <label>
            Gemini 比例
            <select id="geminiAspectRatio">
              <option>1:1</option>
              <option>4:5</option>
              <option>9:16</option>
              <option>16:9</option>
            </select>
          </label>
          <label>
            默认图片模型
            <select id="defaultProvider">
              <option value="mock">Mock 流程预览</option>
              <option value="openai">OpenAI gpt-image</option>
              <option value="gemini">Gemini Nano Banana</option>
            </select>
          </label>
        </div>
        <div class="button-row">
          <button id="saveConfig" class="primary" type="button">保存配置</button>
          <button id="clearConfig" class="ghost" type="button">清空本地配置</button>
        </div>
        <div id="configStatus" class="status"></div>
      </section>

      <section class="grid">
        <form id="ideaForm" class="panel">
          <div class="panel-title">
            <h2>AI 生成选题灵感</h2>
            <span id="keyStatus">未读取配置</span>
          </div>
          <label>
            补充方向
            <textarea id="brief" rows="4" placeholder="可以留空，也可以写：老家、奶奶、校门口、二十年后的现在（2026年）独自回来"></textarea>
          </label>
          <div class="field-row">
            <label>
              主题
              <select id="theme">
                <option>农村老屋</option>
                <option>老家院子</option>
                <option>村庄变迁</option>
                <option>荒废院落</option>
                <option>亲情</option>
                <option>校园</option>
                <option>老街</option>
                <option>爱情</option>
                <option>宠物</option>
                <option>城市变迁</option>
                <option>老物件</option>
              </select>
            </label>
            <label>
              情绪
              <select id="emotion">
                <option>怀旧</option>
                <option>温暖</option>
                <option>遗憾</option>
                <option>治愈</option>
                <option>孤独</option>
                <option>释然</option>
              </select>
            </label>
          </div>
          <div class="field-row">
            <label>
              平台
              <select id="platform">
                <option>小红书</option>
                <option>抖音</option>
                <option>视频号</option>
                <option>公众号</option>
              </select>
            </label>
            <label>
              数量
              <input id="count" type="number" min="1" max="12" value="6">
            </label>
          </div>
          <div class="button-row">
            <button class="primary" type="submit">生成灵感</button>
            <button id="titleButton" class="secondary" type="button">生成短视频标题</button>
          </div>
          <div id="ideaStatus" class="status"></div>
        </form>

        <section class="panel">
          <div class="panel-title">
            <h2>当前提示词</h2>
            <span id="selectedTitle">未选择</span>
          </div>
          <label>
            2000年前后旧照片提示词
            <textarea id="decadePrompt" rows="8" placeholder="选择一个选题后自动生成，也可以手动编辑"></textarea>
          </label>
          <label>
            现在（2026年）同地点提示词
            <textarea id="nowPrompt" rows="8" placeholder="这里会尽量保持同地点、同视角，只改变时间后的状态"></textarea>
          </label>
          <div class="field-row">
            <label>
              图片模型
              <select id="providerSelect">
                <option value="mock">Mock 流程预览</option>
                <option value="openai">OpenAI gpt-image</option>
                <option value="gemini">Gemini Nano Banana</option>
              </select>
            </label>
            <label>
              比例
              <select id="ratio">
                <option>4:5</option>
                <option>1:1</option>
                <option>9:16</option>
                <option>16:9</option>
              </select>
            </label>
          </div>
          <div class="button-row">
            <button id="promptButton" class="ghost" type="button">用当前灵感重写提示词</button>
            <button id="copyPromptButton" class="secondary" type="button">复制竖版合图提示词</button>
            <button id="imageButton" class="primary" type="button">生成两张图片</button>
          </div>
          <div id="imageStatus" class="status"></div>
        </section>
      </section>

      <section class="panel title-workshop">
        <div class="panel-title">
          <h2>短视频标题灵感</h2>
          <span id="titleCount">0 个 · 点击标题即可复制</span>
        </div>
        <div id="titles" class="title-list"></div>
        <div id="titleStatus" class="status"></div>
      </section>

      <section class="grid bottom-grid">
        <section class="panel">
          <div class="panel-title">
            <h2>灵感选题</h2>
            <span id="ideaCount">0 个</span>
          </div>
          <div id="ideas" class="idea-list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>图片结果</h2>
            <span id="resultStatus">等待生成</span>
          </div>
          <div class="image-grid">
            <figure>
              <div class="image-box"><img id="decadeImage" alt="2000年前后旧照片"></div>
              <figcaption><span>2000年前后旧照片</span><a id="downloadDecade" class="hidden" download="2000年前后旧照片.png">下载</a></figcaption>
            </figure>
            <figure>
              <div class="image-box"><img id="nowImage" alt="现在（2026年）图片"></div>
              <figcaption><span>现在（2026年）</span><a id="downloadNow" class="hidden" download="现在（2026年）.png">下载</a></figcaption>
            </figure>
          </div>
          <div class="copy-block">
            <h3>配文</h3>
            <textarea id="caption" rows="5" placeholder="生成提示词后这里会出现自媒体配文"></textarea>
          </div>
        </section>
      </section>
    </main>

    <script>
      const $ = (selector) => document.querySelector(selector);
      const storageKey = "timeEchoSingleFileConfig";
      const state = {
        config: {},
        ideas: [],
        ideaHistory: [],
        titles: [],
        titleHistory: [],
        selectedIdea: null,
        promptPack: null
      };

      const defaults = {
        deepseekKey: "",
        deepseekBaseUrl: "https://api.deepseek.com",
        deepseekModel: "deepseek-chat",
        openaiKey: "",
        openaiModel: "gpt-image-2",
        openaiSize: "1024x1024",
        openaiQuality: "medium",
        geminiKey: "",
        geminiModel: "gemini-2.5-flash-image",
        geminiAspectRatio: "1:1",
        defaultProvider: "mock"
      };

      const systemPrompt = `你是一个自媒体视觉策划和 AI 生图提示词导演。
你的任务是围绕“2000年前后旧照片 vs 现在（2026年）”的时间对照图生成创意、提示词和文案。
围绕真实的农村生活、家庭记忆和村庄环境变迁自由创造场景，不要把常见示例当成固定菜单，不要形成固定场景组合或固定输出顺序。核心不是“过去穷现在（2026年）富”，而是“以前简陋但有生机，现在（2026年）更清楚但荒凉空置”。
风格要求：真实、克制、有生活感，避免空洞鸡汤，避免过度煽情，重点表现房子还在、生活不在了，烟火气消失，人气散了。
输出必须是严格 JSON，不要 Markdown，不要解释。`;

      const oldPhotoTexture = "2000年前后彩色冲印照片翻拍质感：整张图不是直接拍摄过去现场，而是一张现代手机近距离翻拍的旧纸质彩色照片。旧照片可以放在木桌、旧相册页或普通桌面上，可有一只手轻轻按住边角；现代手机拍摄的外层桌面、手指、阴影和相纸边缘相对清楚，但旧照片内部的农村场景必须明显比外层低清、发软、细节少。旧照片内部要像傻瓜相机或早期数码相机拍完后冲印出来、又保存了二十多年后的普通家庭快照：低动态范围，轻微跑焦，暗部发脏，亮部略过曝，颜色褪色不均，轻微偏暖、偏红或偏绿，低饱和，边缘略糊。岁月痕迹必须进入照片内容区域，不要只旧在白边和角落：照片里的砖缝、树皮、墙面纹理、人物五官和衣服细节都不要锐利；画面内容上要有细小划痕、灰尘点、轻微水渍、压痕、折痕线、相纸老化斑和不均匀反光。相纸可有指纹、轻微卷角或折痕，但不要黑白、不要严重泛黄、不要七八十年代感、不要民国感、不要复古海报风。构图普通、不完美，像从家里抽屉翻出照片后随手用现在手机拍下来。强烈避免旧照片内部像现代高清摄影、高清修复老照片、新打印仿旧照片、电影光影、清晰砖缝、清晰树皮、清晰人物五官、专业摄影棚、商业广告质感。画面内绝对不要出现任何文字、数字、年份、日期、标题、标签、字幕、说明、Logo或水印；“2000年前后”和“2006年”只用于理解时间背景，不得渲染到图片中。";

      async function copyText(text) {
        if (navigator.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(text);
            return;
          } catch {
            // 剪贴板权限失败时继续使用 textarea 兜底。
          }
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.append(textarea);
        textarea.select();
        const copied = document.execCommand("copy");
        textarea.remove();
        if (!copied) throw new Error("复制失败，请检查浏览器剪贴板权限");
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const text = await response.text();
        let data = {};
        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          data = { raw: text };
        }
        if (!response.ok) {
          throw new Error(data?.error?.message || data?.message || `HTTP ${response.status}`);
        }
        return data;
      }

      async function callDeepSeek(messages, temperature = 0.85) {
        if (!state.config.deepseekKey) throw new Error("DeepSeek API Key 未配置");
        const baseUrl = state.config.deepseekBaseUrl.replace(/\/$/, "");
        const data = await fetchJson(`${baseUrl}/chat/completions`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
            authorization: `Bearer ${state.config.deepseekKey}`
          },
          body: JSON.stringify({
            model: state.config.deepseekModel || "deepseek-chat",
            messages,
            temperature
          })
        });
        return data.choices?.[0]?.message?.content || "";
      }

      function extractJson(text) {
        const cleaned = String(text || "").replace(/^```(?:json)?/i, "").replace(/```$/i, "").trim();
        try {
          return JSON.parse(cleaned);
        } catch {
          const match = cleaned.match(/\{[\s\S]*\}/);
          if (match) return JSON.parse(match[0]);
          throw new Error("模型没有返回可解析的 JSON");
        }
      }

3. 2000年前后旧照片必须是现代手机翻拍的实体彩色冲印照片：外层可以出现桌面、旧相册页、手指、相纸边缘、轻微反光、指纹、划痕、卷角或折痕；旧照片内部是农村生活空间，简陋但有生机，可以是老屋院子、灶房、菜园、水井、村口小路、晒谷场、农具棚、牲口棚、小卖部、村卫生室、老戏台、祠堂门口。旧照片内部画面必须比现代手机翻拍的外层明显更低清、更软、更少细节，像傻瓜相机或早期数码相机拍摄后冲印出来、又保存了二十多年后的普通家庭快照：低动态范围、轻微跑焦、暗部发脏、亮部略过曝、轻微偏色、低饱和、褪色不均、边缘略糊。岁月痕迹要进入照片内容区域，不要只放在白边和角落；内容画面里要有细小划痕、灰尘点、轻微水渍、压痕、折痕线、相纸老化斑和不均匀反光。必须明确避免黑白、严重泛黄、七八十年代感、民国感、专业摄影、电影感、精致构图、商业广告质感、复古海报风、高清修复老照片、新打印仿旧照片、清晰砖缝、清晰树皮和清晰人物五官。

      async function imageFromOpenAI(prompt) {
        if (!state.config.openaiKey) throw new Error("OpenAI API Key 未配置");
        const data = await fetchJson("https://api.openai.com/v1/images/generations", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            authorization: `Bearer ${state.config.openaiKey}`
          },
          body: JSON.stringify({
            model: state.config.openaiModel || "gpt-image-2",
            prompt,
            size: state.config.openaiSize || "1024x1024",
            quality: state.config.openaiQuality || "medium",
            n: 1
          })
        });
        const item = data.data?.[0] || {};
        if (item.b64_json) return `data:image/png;base64,${item.b64_json}`;
        if (item.url) return item.url;
        throw new Error("OpenAI 没有返回图片数据");
      }

      async function imageEditFromOpenAI(prompt, referenceDataUrl) {
        if (!referenceDataUrl?.startsWith("data:")) return imageFromOpenAI(prompt);
        if (!state.config.openaiKey) throw new Error("OpenAI API Key 未配置");
        const form = new FormData();
        form.append("model", state.config.openaiModel || "gpt-image-2");
        form.append("prompt", prompt);
        form.append("size", state.config.openaiSize || "1024x1024");
        form.append("quality", state.config.openaiQuality || "medium");
        form.append("n", "1");
        form.append("image", dataUrlToBlob(referenceDataUrl), "reference.png");

        const data = await fetchJson("https://api.openai.com/v1/images/edits", {
          method: "POST",
          headers: { authorization: `Bearer ${state.config.openaiKey}` },
          body: form
        });
        const item = data.data?.[0] || {};
        if (item.b64_json) return `data:image/png;base64,${item.b64_json}`;
        if (item.url) return item.url;
        throw new Error("OpenAI 没有返回图片数据");
      }

      async function imageFromGemini(prompt, referenceDataUrl) {
        if (!state.config.geminiKey) throw new Error("Gemini API Key 未配置");
        const parts = [{ text: prompt }];
        if (referenceDataUrl?.startsWith("data:")) {
          const parsed = parseDataUrl(referenceDataUrl);
          if (parsed) {
            parts.push({
              inlineData: {
                mimeType: parsed.mimeType,
                data: parsed.base64
              }
            });
          }
        }
        const model = state.config.geminiModel || "gemini-2.5-flash-image";
        const data = await fetchJson(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(state.config.geminiKey)}`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts }],
            generationConfig: {
              responseModalities: ["TEXT", "IMAGE"],
              imageConfig: { aspectRatio: state.config.geminiAspectRatio || "1:1" }
            }
          })
        });
        const partsOut = data.candidates?.[0]?.content?.parts || [];
        const imagePart = partsOut.find((part) => part.inlineData?.data || part.inline_data?.data);
        const inline = imagePart?.inlineData || imagePart?.inline_data;
        if (!inline?.data) throw new Error("Gemini 没有返回图片数据");
        return `data:${inline.mimeType || inline.mime_type || "image/png"};base64,${inline.data}`;
      }

      function parseDataUrl(dataUrl) {
        const match = dataUrl.match(/^data:(.+?);base64,(.+)$/);
        return match ? { mimeType: match[1], base64: match[2] } : null;
      }

      function dataUrlToBlob(dataUrl) {
        const parsed = parseDataUrl(dataUrl);
        if (!parsed) throw new Error("参考图不是可用的 data URL");
        const binary = atob(parsed.base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
        return new Blob([bytes], { type: parsed.mimeType });
      }

      function normalizeRatio(value) {
        const text = String(value || "");
        return ["4:5", "1:1", "9:16", "16:9"].find((ratio) => text.includes(ratio));

          '"': "&quot;",

        const idea = state.selectedIdea || {
          title: $("#selectedTitle").textContent,
          story: $("#brief").value.trim() || "同一个地点，2000年前后旧照片里有人陪伴，现在（2026年）独自重返。",
          hook: "时间改变了场景，也改变了站在这里的人。"
        };
        await fillPromptPack(idea);
      });

      $("#copyPromptButton").addEventListener("click", async () => {
        if (!$("#decadePrompt").value.trim() || !$("#nowPrompt").value.trim()) {
          showStatus("#imageStatus", "请先填写旧照片和现在（2026年）两段提示词。", true);
          return;
        }
        try {
          await copyText(buildPromptCopyText());
          showStatus("#imageStatus", "竖版上下合图提示词已复制。");
        } catch (error) {
          showStatus("#imageStatus", friendlyError(error), true);
        }
      });

      $("#imageButton").addEventListener("click", async () => {
        const button = $("#imageButton");
        setBusy(button, true, "图片生成中");
        showStatus("#imageStatus", "正在生成两张图片...");
        $("#resultStatus").textContent = "正在生成";
        $("#decadeImage").removeAttribute("src");
        $("#nowImage").removeAttribute("src");
        $("#downloadDecade").classList.add("hidden");
        $("#downloadNow").classList.add("hidden");
        try {
          const result = await generateImages();
          setImage("#decadeImage", "#downloadDecade", result.decadeUrl, "2000年前后旧照片.png");
          setImage("#nowImage", "#downloadNow", result.nowUrl, "现在（2026年）.png");
          $("#resultStatus").textContent = `${providerName(result.provider)} 已完成`;
          showStatus("#imageStatus", "图片已生成。");
        } catch (error) {
          $("#resultStatus").textContent = "生成失败";
          showStatus("#imageStatus", friendlyError(error), true);
        } finally {
          setBusy(button, false);
        }
      });

      loadConfig();
    </script>
  </body>
</html>
